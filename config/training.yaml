# ============================================================
# YOLOv11 训练配置 — 默认超参数
# ============================================================

model:
  architecture: "yolo11n"       # yolo11n | yolo11s | yolo11m | yolo11l | yolo11x
  pretrained: true              # 是否使用预训练权重
  pretrained_path: ""           # 自定义预训练权重路径 (空=官方权重)

training:
  epochs: 100                   # 最大训练轮数
  batch: 16                     # 批次大小
  imgsz: 640                    # 输入分辨率
  workers: 8                    # 数据加载进程数
  device: "cpu"                 # cpu | cuda:0 | mps
  amp: true                     # 自动混合精度 (仅 GPU)

optimizer:
  type: "AdamW"                 # SGD | Adam | AdamW | RMSProp
  lr0: 0.001                    # 初始学习率
  lrf: 0.01                     # 最终学习率因子 (lr_min = lr0 * lrf)
  momentum: 0.937               # SGD momentum / Adam beta1
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.0

early_stop:
  enabled: true
  patience: 20
  metric: "metrics/mAP50-95(B)"

output:
  root_dir: "runs/train"
  save_period: 10
  plots: true

logging:
  level: "INFO"
  console: true
  file: true
